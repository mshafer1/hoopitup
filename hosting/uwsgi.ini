[uwsgi]
# Flask application settings
module = hoopitupp.app:app
master = true
processes = 1
threads = 1

# Socket configuration
socket = 127.0.0.1:8000
protocol = http

# Logging
logto = /var/log/uwsgi/%n.log
loglevel = info

# Process naming
process-naming-pattern = [%s] %p

# Graceful shutdown
die-on-term = true
vacuum = true
max-requests = 5000
max-requests-delta = 500

# Performance tuning
buffer-size = 32768
harakiri = 300
