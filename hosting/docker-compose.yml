version: '3.8'

services:
  hoopitup:
    build:
      context: ..
      dockerfile: hosting/Dockerfile
    container_name: hoopitup-app
    ports:
      - "80:80"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uwsgi.ini:/app/uwsgi.ini:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
