name: hoopitup-app-${INSTANCE:-prod}

services:
  web:
    build:
      context: ..
      dockerfile: hosting/Dockerfile
    env_file:
      - .env
    ports:
      - "${port_prefix:-40}80:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${port_prefix:-40}80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
